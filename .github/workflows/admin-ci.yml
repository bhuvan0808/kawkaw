name: Admin Dashboard CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/admin_dashboard/**'
      - 'packages/shared_types/**'
      - '.github/workflows/admin-ci.yml'
  pull_request:
    paths:
      - 'apps/admin_dashboard/**'
      - 'packages/shared_types/**'

concurrency:
  group: admin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace @kawkaw/shared-types

      - name: Typecheck
        run: npm run typecheck --workspace @kawkaw/admin-dashboard

      - name: Production build
        run: npm run build --workspace @kawkaw/admin-dashboard
        env:
          # Vercel injects the real values; CI only needs the build to compile.
          NEXT_PUBLIC_API_BASE_URL: https://kawkaw-api.onrender.com/api/v1
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: kawkaw08
