name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/api/**'
      - 'packages/shared_types/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'packages/shared_types/**'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kawkaw
          POSTGRES_PASSWORD: kawkaw
          POSTGRES_DB: kawkaw_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kawkaw"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://kawkaw:kawkaw@localhost:5432/kawkaw_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_0123456789_0123456789_0123456789
      JWT_REFRESH_SECRET: ci_refresh_secret_0123456789_0123456789_0123
      FIREBASE_PROJECT_ID: kawkaw08
      API_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace @kawkaw/shared-types

      - name: Generate Prisma client
        run: npm --workspace @kawkaw/api run prisma:generate

      - name: Validate Prisma schema
        run: npm --workspace @kawkaw/api run prisma:validate

      - name: Lint
        run: npm --workspace @kawkaw/api run lint:check

      - name: Typecheck
        run: npm --workspace @kawkaw/api run typecheck

      - name: Apply migrations
        run: npm --workspace @kawkaw/api run prisma:migrate:deploy

      - name: Build
        run: npm run build --workspace @kawkaw/api

      - name: Unit tests
        run: npm --workspace @kawkaw/api run test

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f services/api/Dockerfile -t kawkaw-api:ci .
