name: Flutter Apps CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/customer_app/**'
      - 'apps/rider_app/**'
      - 'packages/shared_ui/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/customer_app/**'
      - 'apps/rider_app/**'
      - 'packages/shared_ui/**'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [customer_app, rider_app]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.x
          cache: true

      - name: Flutter pub get
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze

      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: flutter test
