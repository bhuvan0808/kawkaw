name: kawkaw_rider
description: Kaw Kaw rider app — accept and deliver orders & parcels.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Design system
  kawkaw_ui:
    path: ../../packages/shared_ui

  # State / navigation / networking
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0

  # Firebase (auth + push)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6

  # Maps (OpenStreetMap / OSRM / Nominatim)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Background location (Android foreground service) + permissions
  flutter_foreground_task: ^8.17.0
  permission_handler: ^11.3.1

  # Realtime + alerts
  socket_io_client: ^3.0.2
  vibration: ^2.0.0

  # Storage & misc
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
