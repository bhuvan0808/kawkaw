name: kawkaw_customer
description: Kaw Kaw customer app — order grocery, pharmacy, food & parcels.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Design system
  kawkaw_ui:
    path: ../../packages/shared_ui

  # State / navigation / networking
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0

  # Firebase (auth + push)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6

  # Maps (OpenStreetMap / OSRM / Nominatim)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Realtime
  socket_io_client: ^3.0.2

  # Storage & misc
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
